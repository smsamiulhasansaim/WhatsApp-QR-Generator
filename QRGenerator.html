<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WhatsApp QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#0f1117; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; padding:20px; }
.card { background:#1a1d27; border:1px solid #2a2d3a; border-radius:24px; padding:40px; width:100%; max-width:480px; box-shadow:0 25px 60px rgba(0,0,0,.5); }
.header { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.wa-icon { width:44px; height:44px; background:linear-gradient(135deg,#25d366,#128c7e); border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.header-text h1 { font-size:20px; font-weight:700; color:#fff; }
.header-text p { font-size:13px; color:#6b7280; margin-top:2px; }
label { display:block; font-size:12px; font-weight:600; color:#9ca3af; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.input-wrap { position:relative; margin-bottom:20px; }
.prefix { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#25d366; font-size:14px; font-weight:600; pointer-events:none; }
input[type=text], textarea { width:100%; background:#0f1117; border:1.5px solid #2a2d3a; border-radius:12px; color:#f3f4f6; font-size:15px; font-family:inherit; outline:none; transition:border-color .2s,box-shadow .2s; }
input[type=text] { padding:13px 14px 13px 90px; }
input:focus, textarea:focus { border-color:#25d366; box-shadow:0 0 0 3px rgba(37,211,102,.1); }
textarea { padding:13px 14px; resize:vertical; min-height:110px; line-height:1.5; }
::placeholder { color:#4b5563; }
.btn { width:100%; padding:14px; background:linear-gradient(135deg,#25d366,#128c7e); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s,transform .15s; margin-top:4px; }
.btn:hover { opacity:.9; transform:translateY(-1px); }
.result { display:none; margin-top:28px; text-align:center; animation:up .35s ease; }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.divider { height:1px; background:#2a2d3a; margin-bottom:28px; }
.qr-box { display:inline-block; background:#fff; padding:16px; border-radius:20px; box-shadow:0 8px 30px rgba(37,211,102,.2); }
.note { margin-top:14px; font-size:13px; color:#6b7280; }
.note b { display:block; color:#25d366; font-size:14px; margin-top:4px; word-break:break-all; }
.dl { display:inline-flex; align-items:center; gap:8px; margin-top:14px; padding:10px 22px; border:1.5px solid #25d366; border-radius:10px; color:#25d366; font-size:13px; font-weight:600; text-decoration:none; transition:background .2s,color .2s; }
.dl:hover { background:#25d366; color:#fff; }
.err { color:#f87171; font-size:13px; margin-bottom:12px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="wa-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <div class="header-text">
      <h1>WhatsApp QR Generator</h1>
      <p>Scan to open WhatsApp with a preset message</p>
    </div>
  </div>

  <label>WhatsApp Number</label>
  <div class="input-wrap">
    <span class="prefix">+880 ›</span>
    <input type="text" id="phone" placeholder="01XXXXXXXXX" maxlength="15"/>
  </div>
  <p class="err" id="err">⚠ Please enter a valid phone number.</p>

  <div style="margin-bottom:24px">
    <label>Predefined Message</label>
    <textarea id="msg" placeholder="Type your message here..."></textarea>
  </div>

  <button class="btn" onclick="gen()">⚡ Generate QR Code</button>

  <div class="result" id="result">
    <div class="divider"></div>
    <div class="qr-box"><div id="qr"></div></div>
    <div class="note">Scan to open WhatsApp<b id="url"></b></div>
    <a class="dl" id="dl" download="whatsapp-qr.png">↓ Download QR</a>
  </div>
</div>
<script>
function gen() {
  const p = document.getElementById('phone').value.trim().replace(/\D/g,'');
  const m = document.getElementById('msg').value.trim();
  const e = document.getElementById('err');
  if (!p || p.length < 7) { e.style.display='block'; return; }
  e.style.display='none';
  const url = 'https://wa.me/'+p+(m?'?text='+encodeURIComponent(m):'');
  document.getElementById('url').textContent = 'wa.me/'+p;
  const c = document.getElementById('qr');
  c.innerHTML='';
  new QRCode(c,{text:url,width:220,height:220,colorDark:'#128c7e',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('result').style.display='block';
  setTimeout(()=>{
    const cv=c.querySelector('canvas');
    if(cv) document.getElementById('dl').href=cv.toDataURL('image/png');
  },250);
}
document.getElementById('phone').addEventListener('keydown',e=>{if(e.key==='Enter')gen();});
</script>
</body>
</html>
